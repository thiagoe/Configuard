server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Resolver DNS interno do Docker — necessário para resolução dinâmica do upstream
    resolver 127.0.0.11 valid=10s;

    # SPA: todas as rotas desconhecidas → index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy reverso para o backend (comunicação interna via nome de serviço Docker)
    # Usar variável + $request_uri força resolução DNS dinâmica pelo resolver 127.0.0.11
    location /api/ {
        set $backend http://backend:8000;
        proxy_pass $backend$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE (Server-Sent Events para streaming de backup em tempo real)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }
}
